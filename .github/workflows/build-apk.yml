name: Build APK Android

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Ambil repository
        uses: actions/checkout@v4

      - name: Siapkan Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Siapkan Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2

      - name: Siapkan Android SDK
        uses: android-actions/setup-android@v3

      - name: Install paket Android SDK
        run: sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Buat project Android otomatis
        run: |
          rm -rf app
          mkdir -p app/src/main/java/com/divamartin/tugasharian
          mkdir -p app/src/main/res/values

          cat > settings.gradle <<'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }

          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }

          rootProject.name = "TugasHarianDiva"
          include ':app'
          EOF

          cat > build.gradle <<'EOF'
          plugins {
              id 'com.android.application' version '8.7.3' apply false
          }
          EOF

          cat > app/build.gradle <<'EOF'
          plugins {
              id 'com.android.application'
          }

          android {
              namespace 'com.divamartin.tugasharian'
              compileSdk 35

              defaultConfig {
                  applicationId 'com.divamartin.tugasharian'
                  minSdk 23
                  targetSdk 35
                  versionCode 1
                  versionName '1.0'
              }

              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          EOF

          cat > app/src/main/res/values/styles.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="android:style/Theme.Material.Light.NoActionBar">
                  <item name="android:fontFamily">sans</item>
                  <item name="android:windowLightStatusBar">false</item>
                  <item name="android:statusBarColor">#111827</item>
                  <item name="android:navigationBarColor">#111827</item>
                  <item name="android:colorAccent">#4F46E5</item>
              </style>
          </resources>
          EOF

          cat > app/src/main/AndroidManifest.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application
                  android:allowBackup="true"
                  android:label="Tugas Harian Diva"
                  android:theme="@style/AppTheme">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          cat > app/src/main/java/com/divamartin/tugasharian/MainActivity.java <<'EOF'
          package com.divamartin.tugasharian;

          import android.app.Activity;
          import android.app.AlertDialog;
          import android.content.Context;
          import android.content.SharedPreferences;
          import android.graphics.Color;
          import android.graphics.Typeface;
          import android.graphics.drawable.GradientDrawable;
          import android.os.Bundle;
          import android.view.Gravity;
          import android.widget.Button;
          import android.widget.EditText;
          import android.widget.LinearLayout;
          import android.widget.ScrollView;
          import android.widget.TextView;
          import android.widget.Toast;
          import org.json.JSONArray;
          import org.json.JSONObject;
          import java.util.ArrayList;

          public class MainActivity extends Activity {
              private LinearLayout list;
              private EditText inputTugas, inputKet;
              private TextView totalText;
              private ArrayList<String> tugas = new ArrayList<>();
              private static final String PREF = "data_tugas_diva";

              @Override
              protected void onCreate(Bundle b) {
                  super.onCreate(b);
                  load();
                  createView();
                  refresh();
              }

              private void createView() {
                  ScrollView scroll = new ScrollView(this);
                  LinearLayout root = new LinearLayout(this);
                  root.setOrientation(LinearLayout.VERTICAL);
                  root.setPadding(dp(16), dp(16), dp(16), dp(16));
                  root.setBackgroundColor(Color.parseColor("#F3F6FB"));
                  scroll.addView(root);

                  TextView title = text("Aplikasi Tugas Harian", 25, "#FFFFFF", true);
                  TextView sub = text("Catat tugas langsung dari HP Android.", 14, "#E0E7FF", false);

                  LinearLayout header = new LinearLayout(this);
                  header.setOrientation(LinearLayout.VERTICAL);
                  header.setPadding(dp(18), dp(18), dp(18), dp(18));
                  header.setBackground(bg("#4F46E5", 22));
                  header.addView(title);
                  header.addView(sub);
                  root.addView(header);

                  totalText = text("Total tugas: 0", 16, "#111827", true);
                  totalText.setPadding(0, dp(16), 0, dp(6));
                  root.addView(totalText);

                  inputTugas = input("Nama tugas");
                  root.addView(inputTugas);

                  inputKet = input("Keterangan tugas");
                  root.addView(inputKet);

                  Button tambah = button("Tambah Tugas", "#4F46E5");
                  LinearLayout.LayoutParams bp = new LinearLayout.LayoutParams(-1, dp(50));
                  bp.setMargins(0, dp(10), 0, dp(10));
                  root.addView(tambah, bp);

                  tambah.setOnClickListener(v -> {
                      String nama = inputTugas.getText().toString().trim();
                      String ket = inputKet.getText().toString().trim();

                      if (nama.isEmpty()) {
                          Toast.makeText(this, "Nama tugas wajib diisi.", Toast.LENGTH_SHORT).show();
                          return;
                      }

                      tugas.add(nama + "||" + ket + "||Belum Selesai");
                      inputTugas.setText("");
                      inputKet.setText("");
                      save();
                      refresh();
                  });

                  list = new LinearLayout(this);
                  list.setOrientation(LinearLayout.VERTICAL);
                  root.addView(list);

                  Button hapusSemua = button("Hapus Semua Data", "#EF4444");
                  LinearLayout.LayoutParams hp = new LinearLayout.LayoutParams(-1, dp(50));
                  hp.setMargins(0, dp(12), 0, dp(20));
                  root.addView(hapusSemua, hp);

                  hapusSemua.setOnClickListener(v -> new AlertDialog.Builder(this)
                          .setTitle("Konfirmasi")
                          .setMessage("Hapus semua tugas?")
                          .setPositiveButton("Ya", (d, w) -> {
                              tugas.clear();
                              save();
                              refresh();
                          })
                          .setNegativeButton("Batal", null)
                          .show());

                  setContentView(scroll);
              }

              private void refresh() {
                  if (list == null) return;
                  list.removeAllViews();
                  totalText.setText("Total tugas: " + tugas.size());

                  if (tugas.isEmpty()) {
                      TextView kosong = text("Belum ada tugas.", 15, "#64748B", false);
                      kosong.setGravity(Gravity.CENTER);
                      kosong.setPadding(0, dp(20), 0, dp(20));
                      list.addView(kosong);
                      return;
                  }

                  for (int i = tugas.size() - 1; i >= 0; i--) {
                      final int index = i;
                      String[] data = tugas.get(i).split("\\|\\|", -1);
                      String nama = data.length > 0 ? data[0] : "";
                      String ket = data.length > 1 ? data[1] : "";
                      String status = data.length > 2 ? data[2] : "Belum Selesai";

                      LinearLayout card = new LinearLayout(this);
                      card.setOrientation(LinearLayout.VERTICAL);
                      card.setPadding(dp(14), dp(14), dp(14), dp(14));
                      card.setBackground(bg("#FFFFFF", 18));

                      LinearLayout.LayoutParams cp = new LinearLayout.LayoutParams(-1, -2);
                      cp.setMargins(0, dp(8), 0, 0);
                      card.setLayoutParams(cp);

                      card.addView(text(nama, 18, "#111827", true));
                      card.addView(text("Status: " + status, 13, "#4B5563", false));

                      if (!ket.isEmpty()) {
                          card.addView(text(ket, 14, "#374151", false));
                      }

                      LinearLayout row = new LinearLayout(this);
                      row.setOrientation(LinearLayout.HORIZONTAL);
                      row.setPadding(0, dp(8), 0, 0);
                      card.addView(row);

                      Button selesai = button(status.equals("Selesai") ? "Belum" : "Selesai", "#22C55E");
                      Button hapus = button("Hapus", "#EF4444");

                      row.addView(selesai, new LinearLayout.LayoutParams(0, dp(44), 1));
                      LinearLayout.LayoutParams p = new LinearLayout.LayoutParams(0, dp(44), 1);
                      p.setMargins(dp(8), 0, 0, 0);
                      row.addView(hapus, p);

                      selesai.setOnClickListener(v -> {
                          String[] d = tugas.get(index).split("\\|\\|", -1);
                          String st = d[2].equals("Selesai") ? "Belum Selesai" : "Selesai";
                          tugas.set(index, d[0] + "||" + d[1] + "||" + st);
                          save();
                          refresh();
                      });

                      hapus.setOnClickListener(v -> {
                          tugas.remove(index);
                          save();
                          refresh();
                      });

                      list.addView(card);
                  }
              }

              private void save() {
                  try {
                      JSONArray arr = new JSONArray();
                      for (String t : tugas) arr.put(t);
                      getSharedPreferences(PREF, Context.MODE_PRIVATE).edit().putString("items", arr.toString()).apply();
                  } catch (Exception ignored) {}
              }

              private void load() {
                  try {
                      String raw = getSharedPreferences(PREF, Context.MODE_PRIVATE).getString("items", "[]");
                      JSONArray arr = new JSONArray(raw);
                      tugas.clear();
                      for (int i = 0; i < arr.length(); i++) tugas.add(arr.getString(i));
                  } catch (Exception ignored) {}
              }

              private TextView text(String s, int size, String color, boolean bold) {
                  TextView t = new TextView(this);
                  t.setText(s);
                  t.setTextSize(size);
                  t.setTextColor(Color.parseColor(color));
                  if (bold) t.setTypeface(Typeface.DEFAULT_BOLD);
                  return t;
              }

              private EditText input(String hint) {
                  EditText e = new EditText(this);
                  e.setHint(hint);
                  e.setTextSize(14);
                  e.setPadding(dp(12), 0, dp(12), 0);
                  e.setBackground(stroke("#FFFFFF", "#CBD5E1", 14));
                  LinearLayout.LayoutParams p = new LinearLayout.LayoutParams(-1, dp(52));
                  p.setMargins(0, dp(8), 0, 0);
                  e.setLayoutParams(p);
                  return e;
              }

              private Button button(String s, String color) {
                  Button b = new Button(this);
                  b.setText(s);
                  b.setTextColor(Color.WHITE);
                  b.setTextSize(13);
                  b.setTypeface(Typeface.DEFAULT_BOLD);
                  b.setAllCaps(false);
                  b.setBackground(bg(color, 14));
                  return b;
              }

              private GradientDrawable bg(String color, int radius) {
                  GradientDrawable g = new GradientDrawable();
                  g.setColor(Color.parseColor(color));
                  g.setCornerRadius(dp(radius));
                  return g;
              }

              private GradientDrawable stroke(String color, String stroke, int radius) {
                  GradientDrawable g = bg(color, radius);
                  g.setStroke(dp(1), Color.parseColor(stroke));
                  return g;
              }

              private int dp(int v) {
                  return Math.round(v * getResources().getDisplayMetrics().density);
              }
          }
          EOF

      - name: Build APK Debug
        run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Tugas-Harian-Diva-APK
          path: app/build/outputs/apk/debug/app-debug.apk
